<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#555"/></marker>
    <marker id="arrow-r" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#d32f2f"/></marker>
    <style>
      .box{fill:#fff;stroke:#1a6a7a;stroke-width:2;rx:8;ry:8}
      .box2{fill:#e6f4f7;stroke:#1a6a7a;stroke-width:2;rx:8;ry:8}
      .box-dr{fill:#fff3e0;stroke:#e8942a;stroke-width:2;rx:8;ry:8}
      .box-ap{fill:#e8f5e9;stroke:#388e3c;stroke-width:2;rx:8;ry:8}
      .box-rj{fill:#fce4ec;stroke:#d32f2f;stroke-width:2;rx:8;ry:8}
      .box-pb{fill:#e3f2fd;stroke:#1565c0;stroke-width:2;rx:8;ry:8}
      .box3{fill:#fff;stroke:#999;stroke-width:1.5;rx:6;ry:6;stroke-dasharray:6,3}
      .label{fill:#333;font-size:12;text-anchor:middle;dominant-baseline:middle}
      .label-sm{fill:#555;font-size:9;text-anchor:middle;dominant-baseline:middle}
      .label-xs{fill:#888;font-size:8;text-anchor:middle;dominant-baseline:middle}
      .arrow{stroke:#555;stroke-width:1.5;fill:none;marker-end:url(#arrow)}
      .arrow-r{stroke:#d32f2f;stroke-width:1.2;fill:none;stroke-dasharray:5,3;marker-end:url(#arrow-r)}
      .section{fill:#fafafa;stroke:#ccc;stroke-width:1;rx:10;ry:10}
      .section-title{fill:#666;font-size:9;font-weight:bold}
    </style>
  </defs>

  <text x="550" y="18" font-size="16" fill="#1a6a7a" text-anchor="middle" font-weight="bold">Case Study Lifecycle — 5-State Workflow</text>

  <!-- ===== TOP: Status Pipeline ===== -->
  <rect x="30" y="40" width="1040" height="170" class="section"/>
  <text x="550" y="58" class="section-title" text-anchor="middle">STATUS PIPELINE</text>

  <rect x="45" y="72" width="140" height="55" class="box"/><text x="115" y="92" class="label">📄 Draft</text><text x="115" y="108" class="label-sm">Creator writes</text>

  <path d="M185,100 L220,100" class="arrow"/>
  <text x="202" y="92" class="label-xs" fill="#d48924">author submits</text>

  <rect x="225" y="72" width="140" height="55" class="box2"/><text x="295" y="92" class="label">📤 Submitted</text><text x="295" y="108" class="label-sm">In review queue</text>

  <path d="M365,100 L400,100" class="arrow"/>
  <text x="382" y="92" class="label-xs" fill="#d48924">SRF starts review</text>

  <rect x="405" y="72" width="140" height="55" class="box-dr"/><text x="475" y="92" class="label">🔍 Under Review</text><text x="475" y="108" class="label-sm">SRF reviewing</text>

  <path d="M545,100 L580,100" class="arrow"/>
  <text x="562" y="92" class="label-xs" fill="#388e3c">SRF approves</text>

  <rect x="585" y="72" width="140" height="55" class="box-ap"/><text x="655" y="92" class="label">✅ Approved</text><text x="655" y="108" class="label-sm">Ready to publish</text>

  <path d="M725,100 L760,100" class="arrow"/>
  <text x="742" y="92" class="label-xs" fill="#1565c0">coordinator/director</text>
  <text x="742" y="102" class="label-xs" fill="#1565c0">publishes</text>

  <rect x="765" y="72" width="140" height="55" class="box-pb"/><text x="835" y="92" class="label">🌐 Published</text><text x="835" y="108" class="label-sm">Publicly visible</text>

  <!-- Return path -->
  <path d="M475,127 L475,150 L115,150 L115,127" class="arrow-r"/>
  <text x="295" y="143" class="label-xs" fill="#d32f2f">SRF returns with comments</text>

  <!-- Direct publish from draft -->
  <path d="M115,72 L475,72 L835,72" class="arrow" style="stroke:#999;stroke-dasharray:3,3;fill:none;marker-end:none"/>
  <text x="475" y="65" class="label-xs" fill="#999">Non-author: publish from any status</text>

  <!-- ===== COLUMN 1: Authors & Creation ===== -->
  <rect x="30" y="225" width="340" height="470" class="section"/>
  <text x="200" y="243" class="section-title" text-anchor="middle">CREATION &amp; AUTHORS</text>

  <rect x="40" y="255" width="320" height="105" class="box"/>
  <text x="200" y="272" class="label">Case Types</text>
  <line x1="50" y1="282" x2="350" y2="282" stroke="#ddd"/>
  <text x="50" y="298" class="label-sm" text-anchor="start">📄 Case Study     — Detailed research write-up</text>
  <text x="50" y="313" class="label-sm" text-anchor="start">📋 Policy Brief   — Concise policy recommendations</text>
  <text x="50" y="328" class="label-sm" text-anchor="start">✨ Field Breakthrough — Notable field achievement</text>

  <rect x="40" y="380" width="320" height="100" class="box"/>
  <text x="200" y="397" class="label">Creation Form Fields</text>
  <line x1="50" y1="407" x2="350" y2="407" stroke="#ddd"/>
  <text x="50" y="422" class="label-sm" text-anchor="start">• Type (select), Title (required), Summary</text>
  <text x="50" y="437" class="label-sm" text-anchor="start">• Content (body), OneDrive link</text>
  <text x="50" y="452" class="label-sm" text-anchor="start">• Tags (comma-separated, Fellow form only)</text>
  <text x="50" y="467" class="label-sm" text-anchor="start">• attachmentName always null (no file upload)</text>

  <rect x="40" y="500" width="320" height="90" class="box2"/>
  <text x="200" y="517" class="label">Who Can Create?</text>
  <line x1="50" y1="527" x2="350" y2="527" stroke="#ddd"/>
  <text x="50" y="542" class="label-sm" text-anchor="start">Fellow      → /fellow/cases       (full form + tags)</text>
  <text x="50" y="557" class="label-sm" text-anchor="start">Data Scientist → /data-scientist/analysis (simplified)</text>
  <text x="50" y="572" class="label-sm" text-anchor="start">SRF         → /srf/research      (simplified)</text>

  <rect x="40" y="610" width="320" height="70" class="box3"/>
  <text x="200" y="627" class="label-sm">Author Permissions</text>
  <line x1="50" y1="635" x2="350" y2="635" stroke="#ddd"/>
  <text x="50" y="650" class="label-xs" text-anchor="start">• Can submit own drafts (draft → submitted)</text>
  <text x="50" y="663" class="label-xs" text-anchor="start">• Cannot approve or publish</text>

  <!-- ===== COLUMN 2: Review & CaseDiscussion ===== -->
  <rect x="390" y="225" width="340" height="470" class="section"/>
  <text x="560" y="243" class="section-title" text-anchor="middle">REVIEW &amp; CASE DISCUSSION</text>

  <rect x="400" y="255" width="320" height="180" class="box-dr"/>
  <text x="560" y="272" class="label">SRF Review Pipeline (/srf/cases)</text>
  <line x1="410" y1="282" x2="710" y2="282" stroke="#ddd"/>
  <text x="410" y="298" class="label-sm" text-anchor="start">Tabs: Pending | Approved | All</text>
  <text x="410" y="316" class="label-sm" text-anchor="start" font-weight="bold">Review Actions:</text>
  <text x="410" y="333" class="label-sm" text-anchor="start">1. Start Review → sets reviewedBy, reviewedAt</text>
  <text x="410" y="348" class="label-sm" text-anchor="start">2. Approve → sets status=approved + comments</text>
  <text x="410" y="363" class="label-sm" text-anchor="start">3. Return to Fellow → status=submitted</text>
  <text x="410" y="378" class="label-sm" text-anchor="start">   (sets reviewedBy, reviewedByName, reviewedAt,</text>
  <text x="410" y="393" class="label-sm" text-anchor="start">   reviewComments)</text>
  <text x="410" y="410" class="label-sm" text-anchor="start">Stats cards: Pending (orange), Approved (green), All</text>
  <text x="410" y="425" class="label-sm" text-anchor="start">Detail view: case info + OneDrive link + comments</text>

  <rect x="400" y="455" width="320" height="130" class="box"/>
  <text x="560" y="472" class="label">CaseDiscussion Component (Shared)</text>
  <line x1="410" y1="482" x2="710" y2="482" stroke="#ddd"/>
  <text x="410" y="498" class="label-sm" text-anchor="start">• Shows: type badge, status badge, title, author</text>
  <text x="410" y="513" class="label-sm" text-anchor="start">• Content as pre-formatted text</text>
  <text x="410" y="531" class="label-sm" text-anchor="start">• Comment thread with action tags:</text>
  <text x="410" y="546" class="label-sm" text-anchor="start">  💬 discuss  🚀 publish  📊 analyze</text>
  <text x="410" y="564" class="label-sm" text-anchor="start">• Action buttons (conditional):</text>
  <text x="410" y="579" class="label-sm" text-anchor="start">  Publish (non-author, canPublish role)</text>

  <rect x="400" y="605" width="320" height="75" class="box3"/>
  <text x="560" y="622" class="label-sm">Who Can Publish?</text>
  <line x1="410" y1="630" x2="710" y2="630" stroke="#ddd"/>
  <text x="410" y="645" class="label-xs" text-anchor="start">SRF, MDRF Coordinator, MLRF Coordinator,</text>
  <text x="410" y="658" class="label-xs" text-anchor="start">Director, Admin → all have canPublish</text>

  <!-- ===== COLUMN 3: Coordinator/Director ===== -->
  <rect x="750" y="225" width="330" height="470" class="section"/>
  <text x="915" y="243" class="section-title" text-anchor="middle">COORDINATOR / DIRECTOR VIEWS</text>

  <rect x="760" y="258" width="310" height="120" class="box"/>
  <text x="915" y="275" class="label">MDRF Coordinator (/mdrf-coordinator/cases)</text>
  <line x1="770" y1="285" x2="1060" y2="285" stroke="#ddd"/>
  <text x="770" y="300" class="label-sm" text-anchor="start">• Scoped to program = "mdrf"</text>
  <text x="770" y="315" class="label-sm" text-anchor="start">• Tabs: All | Pending | Reviewed | Published</text>
  <text x="770" y="330" class="label-sm" text-anchor="start">• Stats: Pending, Under Review, Approved, Published</text>
  <text x="770" y="345" class="label-sm" text-anchor="start">• Can publish via CaseDiscussion</text>
  <text x="770" y="360" class="label-sm" text-anchor="start">• Cannot create or review</text>

  <rect x="760" y="395" width="310" height="100" class="box2"/>
  <text x="915" y="412" class="label">MLRF Coordinator (/mlrf-coordinator/cases)</text>
  <line x1="770" y1="422" x2="1060" y2="422" stroke="#ddd"/>
  <text x="770" y="437" class="label-sm" text-anchor="start">• Identical to MDRF but scoped to "mlrf"</text>
  <text x="770" y="455" class="label-sm" text-anchor="start">• Same tab structure and stats</text>

  <rect x="760" y="512" width="310" height="80" class="box-pb"/>
  <text x="915" y="529" class="label">Director (/director/cases)</text>
  <line x1="770" y1="539" x2="1060" y2="539" stroke="#ddd"/>
  <text x="770" y="554" class="label-sm" text-anchor="start">• All cases across both programs</text>
  <text x="770" y="569" class="label-sm" text-anchor="start">• Program filter: All | MDRF | MLRF</text>
  <text x="770" y="584" class="label-sm" text-anchor="start">• No status tabs — shows everything</text>

  <rect x="760" y="610" width="310" height="70" class="box3"/>
  <text x="915" y="627" class="label-sm">Firestore Collections</text>
  <line x1="770" y1="635" x2="1060" y2="635" stroke="#ddd"/>
  <text x="770" y="650" class="label-xs" text-anchor="start">caseStudies — stores CaseStudy documents</text>
  <text x="770" y="663" class="label-xs" text-anchor="start">caseComments — stores CaseComment (linked by caseId)</text>

</svg>