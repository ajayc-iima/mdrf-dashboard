<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, sans-serif">
  <style>
    .hdr{fill:#d48924}.panel{fill:#fff;stroke:#ddd;stroke-width:1.5;rx:8;ry:8}
    .label{fill:#333;font-size:12;font-weight:bold;dominant-baseline:middle}
    .val{fill:#d48924;font-size:20;font-weight:bold;dominant-baseline:middle}
    .sublabel{fill:#888;font-size:9;dominant-baseline:middle}
    .tag{fill:#fef3e2;stroke:#d48924;stroke-width:1;rx:4;ry:4}
    .badge-green{fill:#e8f5e9;rx:4;ry:4}
    .badge-red{fill:#fce4ec;rx:4;ry:4}
    .badge-amber{fill:#fff3e0;rx:4;ry:4}
  </style>

  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="42" class="hdr" rx="0"/>
  <text x="20" y="26" fill="#fff" font-size="14" font-weight="bold">MDRF Connect</text>
  <circle cx="740" cy="21" r="12" fill="#fff" opacity="0.3"/>
  <text x="740" y="26" fill="#fff" text-anchor="middle" font-size="9">🔔</text>
  <circle cx="780" cy="21" r="12" fill="#fff" opacity="0.3"/>
  <text x="780" y="26" fill="#fff" text-anchor="middle" font-size="9">AT</text>
  <text x="870" y="26" fill="#fff" font-size="11" text-anchor="end">Fellow Dashboard</text>

  <!-- Deadline banner -->
  <rect x="0" y="42" width="900" height="24" fill="#fff3e0" rx="0"/>
  <text x="450" y="57" fill="#e8942a" font-size="10" text-anchor="middle" font-weight="bold">⏰ 2d 5h left this week — Deadline: Sunday 6 PM</text>

  <!-- Stat cards -->
  <rect x="12" y="78" width="210" height="80" class="panel"/>
  <text x="117" y="108" class="val">3</text><text x="117" y="128" class="sublabel" text-anchor="middle">This Week</text>
  <rect x="117" y="136" width="90" height="14" rx="7" fill="#eee"/>
  <rect x="117" y="136" width="54" height="14" rx="7" fill="#d48924" opacity="0.6"/>
  <text x="144" y="146" fill="#fff" font-size="7" text-anchor="middle">3/5</text>

  <rect x="237" y="78" width="210" height="80" class="panel"/>
  <text x="342" y="108" class="val">7</text><text x="342" y="128" class="sublabel" text-anchor="middle">Streak (days)</text>
  <rect x="342" y="136" width="60" height="14" rx="7" class="badge-green"/><text x="372" y="146" font-size="8" fill="#388e3c" text-anchor="middle">🔥 On fire!</text>

  <rect x="462" y="78" width="210" height="80" class="panel"/>
  <text x="567" y="108" class="val">12</text><text x="567" y="128" class="sublabel" text-anchor="middle">Total Logs</text>
  <text x="567" y="146" class="sublabel" text-anchor="middle">Joined Jul 2026</text>

  <rect x="687" y="78" width="200" height="80" class="panel"/>
  <text x="787" y="108" class="val">🔬 2</text><text x="787" y="128" class="sublabel" text-anchor="middle">Top Category</text>
  <text x="787" y="146" class="sublabel" text-anchor="middle">Research Support</text>

  <!-- Quick log form -->
  <rect x="12" y="175" width="430" height="195" class="panel"/>
  <text x="22" y="198" class="label">📝 Log Work — 3 remaining this week</text>
  <line x1="22" y1="208" x2="432" y2="208" stroke="#eee"/>
  <rect x="22" y="218" width="410" height="28" rx="5" fill="#f5f5f5" stroke="#ddd"/>
  <text x="150" y="236" class="sublabel" text-anchor="middle">🔬 Research  🚶 Fieldwork  📝 Report  🧩 Admin  📚 Capacity  📌 Other</text>
  <rect x="22" y="254" width="410" height="28" rx="5" fill="#f5f5f5" stroke="#ddd"/>
  <text x="227" y="272" class="sublabel" text-anchor="middle">🎤 What did you do? (min 10 chars)</text>
  <rect x="22" y="290" width="410" height="28" rx="5" fill="#f5f5f5" stroke="#ddd"/>
  <text x="227" y="308" class="sublabel" text-anchor="middle">What did you produce? (optional)</text>
  <rect x="22" y="326" width="155" height="30" rx="14" fill="#d48924"/>
  <text x="100" y="346" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Log Work</text>
  <rect x="277" y="326" width="155" height="30" rx="14" fill="#fff" stroke="#ccc"/>
  <text x="355" y="346" class="sublabel" text-anchor="middle">📎 Attach file</text>

  <!-- Tasks -->
  <rect x="457" y="175" width="430" height="195" class="panel"/>
  <text x="467" y="198" class="label">✅ Tasks</text>
  <line x1="467" y1="208" x2="877" y2="208" stroke="#eee"/>
  <rect x="467" y="218" width="410" height="24" rx="4" fill="#f9f9f9"/>
  <text x="477" y="234" font-size="10" fill="#333">○ Compile Q3 fieldwork data — Due Wed</text>
  <rect x="467" y="248" width="410" height="24" rx="4" fill="#f9f9f9"/>
  <text x="477" y="264" font-size="10" fill="#333">○ Draft policy brief on SHG outcomes — Due Fri</text>
  <rect x="467" y="278" width="410" height="24" rx="4" fill="#f9f9f9"/>
  <text x="477" y="294" font-size="10" fill="#999"><s>✓ Complete LMS module 4</s></text>
  <rect x="467" y="308" width="410" height="24" rx="4" fill="#f9f9f9"/>
  <text x="477" y="324" font-size="10" fill="#d32f2f">○ Submit monthly report — ⚠ Overdue!</text>
  <rect x="467" y="340" width="180" height="24" rx="12" fill="#f5f5f5" stroke="#ccc"/>
  <text x="557" y="357" class="sublabel" text-anchor="middle">+ Add new task</text>

  <!-- Bottom row -->
  <rect x="12" y="385" width="285" height="200" class="panel"/>
  <text x="22" y="405" class="label">📚 Course Progress</text>
  <line x1="22" y1="415" x2="287" y2="415" stroke="#eee"/>
  <rect x="22" y="428" width="260" height="16" rx="8" fill="#eee"/>
  <rect x="22" y="428" width="130" height="16" rx="8" fill="#d48924" opacity="0.7"/>
  <text x="152" y="440" fill="#fff" font-size="8" text-anchor="middle">3 / 10 courses</text>
  <text x="22" y="458" font-size="9" fill="#333">📖 MDRF Field Methods — In Progress</text>
  <text x="22" y="473" font-size="9" fill="#333">📖 Data Analysis for Policy — Done ✓</text>
  <text x="22" y="488" font-size="9" fill="#333">📖 Community Engagement — Not Started</text>
  <text x="22" y="503" font-size="9" fill="#333">📖 Research Ethics — In Progress</text>
  <text x="22" y="520" font-size="9" fill="#666" font-style="italic">+ 6 more courses →</text>

  <rect x="310" y="385" width="285" height="200" class="panel"/>
  <text x="320" y="405" class="label">🕐 Recent Activity</text>
  <line x1="320" y1="415" x2="585" y2="415" stroke="#eee"/>
  <text x="320" y="432" font-size="9" fill="#333">📝 3 Jul — Drafted monthly progress report</text>
  <rect x="320" y="436" width="16" height="10" rx="3" class="badge-green"/>
  <text x="328" y="444" font-size="7" fill="#388e3c" text-anchor="middle">C</text>
  <text x="320" y="450" font-size="9" fill="#333">🚶 2 Jul — Field visit to Lumshnong village</text>
  <rect x="320" y="454" width="16" height="10" rx="3" class="badge-green"/>
  <text x="328" y="462" font-size="7" fill="#388e3c" text-anchor="middle">C</text>
  <text x="320" y="468" font-size="9" fill="#333">🔬 1 Jul — Data collection on SHG impact</text>
  <rect x="320" y="472" width="16" height="10" rx="3" class="badge-amber"/>
  <text x="328" y="480" font-size="7" fill="#e8942a" text-anchor="middle">O</text>
  <text x="320" y="490" font-size="9" fill="#999" font-style="italic">View all 12 logs →</text>

  <rect x="610" y="385" width="278" height="200" class="panel"/>
  <text x="620" y="405" class="label">🧠 Need Help?</text>
  <line x1="620" y1="415" x2="878" y2="415" stroke="#eee"/>
  <rect x="620" y="428" width="258" height="32" rx="5" fill="#f5f5f5" stroke="#ccc"/>
  <text x="680" y="448" class="sublabel" text-anchor="middle">📤 Raise a support request</text>
  <rect x="620" y="468" width="258" height="32" rx="5" fill="#f5f5f5" stroke="#ccc"/>
  <text x="680" y="488" class="sublabel" text-anchor="middle">🎯 Request help from Expert (DS/SRF)</text>
  <text x="620" y="525" font-size="9" fill="#d32f2f" font-weight="bold">⚠ Open Requests: 1</text>
  <text x="620" y="540" font-size="9" fill="#d32f2f">  Data access for Q3 report — High urgency</text>
</svg>